<!--

We Start with Just a Classical Website Setup
As this is just a little Add-On to the Bot, we will do it all with Bootstrap
Bootstrap offers some prebuilt templates so we don't have to worry about styling and stuff
That's why we don't even use a css file here
Its a Sandbox like System, which just works by assigning classes to elements
The Documentation can be found here: https://getbootstrap.com/docs/4.1/getting-started/introduction/ 

-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HSG Coding Bot / Reports</title>

  <!-- Favicon to make it a little fancier -->
  <link rel="icon" href="data:image/svg+xml,<svg><text y=%2214%22 font-size=%2214%22>👷</text></svg>">

  <!-- This is all of our CSS, coming directly from the Bootstrap CDN-->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- First Thing we use is a little Navbar with a prebuilt template, it will show a little Title and a Searchbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid d-flex justify-content-between">
      <span class="navbar-brand mb-0 h1">HSG Coding Dashboard</span>
      <input type="search" class="form-control w-auto" id="searchInput" placeholder="Search project...">
    </div>
  </nav>

  <!-- From Here on we do a little Grid with the BootStrap Grid Module -->
  <!-- The cards in here are added automatically by script.js, one per report -->
  <!-- For this we just create a placeholder where it will go into-->

  <div class="container mt-4">
    <div class="row row-cols-1 row-cols-md-3 g-4" id="reports">
    </div>
  </div>

  <!-- The Main Code for the Database Connection is within Script.Js and also BootStrap again for easier access -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- We also need the Supabase Library again, so we can talk to our database from the browser -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <!-- This is a Library ChatGPT told me to use, its for PDF Creation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Here we do the PDF Creation-->
  <script src="pdf.js"></script>
  <!-- Here we do the main stuff like receiving the reports from Supabase-->
  <script src="script.js"></script>
  
</body>
</html>
